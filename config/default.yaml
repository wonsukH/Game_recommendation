# Default hyperparameters for the offline pipeline and the online
# retriever. CLI flags on individual scripts still take precedence;
# this file just sets the fallback defaults so they live in one place.
#
# History: previously each step had its own argparse default. This led
# to drift (params_v1.json captured an old sentence_transformer value
# that no longer matched what the alignment training actually used).
# This file is now the single source of truth.

data:
  game_weights:
    gamma: 0.5
    score_col: s_round10_rec
    weighting: bayesian        # one of: mean | bayesian | variance
    prior_strength: 10         # Bayesian shrinkage k (only used if weighting=bayesian)

models:
  tag_embeddings:
    embedding_dim: 128
    random_state: 42
  tag_effects:
    ridge_alpha: 1.0
    score_col: s_round10_rec
  game_vectors:
    kappa: 1.0
    alpha: 0.5
    eta: 0.2
    ensemble_alpha: 0.7        # weight of PPMI vec; 1-alpha goes to Item2Vec vec
  text_alignment:
    lambda_reg: 0.01
    text_model: solar-embedding-1-large
  item2vec:
    vector_size: 128
    window: 10
    min_count: 2
    epochs: 5
    sg: 1                       # skip-gram (1) vs CBOW (0)
    score_threshold: 7         # s_round10_rec >= this counts as "favorite"

retriever:
  top_k_default: 200
  expand_top_k: 5

rerank:
  presets:
    beginner:
      relevance: 9
      diversity: 4
      novelty: 2
      serendipity: 1
    balanced:
      relevance: 5
      diversity: 5
      novelty: 5
      serendipity: 5

    heavy:
      relevance: 5
      diversity: 7
      novelty: 8
      serendipity: 8
  mmr_lambda: 0.5              # MMR trade-off (0=full diversity, 1=full relevance)
